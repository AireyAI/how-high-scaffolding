<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How High Scaffolding | Welcome</title>
    <meta name="description" content="How High Scaffolding — Professional scaffolding services across the UK. Based in Carlisle.">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="icon" href="icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0A0A;
            overflow: hidden;
            width: 100vw;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        /* SVG Noise Grain */
        .grain::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
        }

        /* Video container */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay content that appears after video */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
            z-index: 10;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-logo {
            width: 120px;
            height: auto;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 40px rgba(232, 122, 30, 0.3));
        }

        .overlay-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            color: #FFFFFF;
            letter-spacing: 0.15em;
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 0 60px rgba(232, 122, 30, 0.2);
        }

        .overlay-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.85rem, 1.5vw, 1.1rem);
            color: #A0A0A0;
            margin-top: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-align: center;
        }

        .enter-btn {
            margin-top: 48px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #E87A1E;
            color: #0A0A0A;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.15em;
            padding: 16px 48px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 30px rgba(232, 122, 30, 0.25);
            opacity: 0;
            transform: translateY(20px);
        }

        .enter-btn.show {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s, background 0.3s ease, box-shadow 0.3s ease;
        }

        .enter-btn:hover {
            background: #FF9642;
            box-shadow: 0 6px 40px rgba(232, 122, 30, 0.4);
            transform: translateY(-2px);
        }

        .enter-btn:active {
            transform: scale(0.97);
        }

        .enter-btn:focus-visible {
            outline: 2px solid #FF9642;
            outline-offset: 4px;
        }

        .enter-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .enter-btn:hover svg {
            transform: translateX(4px);
        }

        /* Skip button */
        .skip-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            color: #A0A0A0;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: none;
            border: 1px solid rgba(160, 160, 160, 0.2);
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 20;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .skip-btn:hover {
            color: #FFFFFF;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .skip-btn:focus-visible {
            outline: 2px solid #FF9642;
            outline-offset: 4px;
        }

        .skip-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Page transition */
        .page-transition {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0A0A0A;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .page-transition.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Ambient glow behind video */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 122, 30, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            animation: pulse-glow 4s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        }

        /* Sound toggle */
        .sound-toggle {
            position: fixed;
            bottom: 32px;
            left: 32px;
            color: #A0A0A0;
            background: none;
            border: 1px solid rgba(160, 160, 160, 0.2);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .sound-toggle:hover {
            color: #FFFFFF;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .sound-toggle:focus-visible {
            outline: 2px solid #FF9642;
            outline-offset: 4px;
        }

        .sound-toggle svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>
<body class="grain">

    <div class="page-transition" id="pageTransition"></div>

    <div class="video-wrapper">
        <div class="ambient-glow"></div>
        <video id="introVideo" muted playsinline preload="auto">
            <source src="videos/cymatics-hh.mp4" type="video/mp4">
        </video>

        <div class="overlay" id="overlay">
            <img src="brand_assets/logo.png" alt="How High Scaffolding" class="overlay-logo">
            <h1 class="overlay-title">How High Scaffolding</h1>
            <p class="overlay-subtitle">Built to Reach Any Height</p>
            <a href="home.html" class="enter-btn" id="enterBtn" onclick="navigateToSite(event)">
                Enter Site
                <svg viewBox="0 0 24 24"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
            </a>
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" aria-label="Toggle sound">
        <svg id="soundOff" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zm12 4l-2 2 2 2-1.5 1.5L19.5 13l-2 2L16 13.5l2-2-2-2L17.5 8l2 2 2-2L23 9z"/></svg>
        <svg id="soundOn" viewBox="0 0 24 24" style="display:none;"><path d="M11 5L6 9H2v6h4l5 4V5zm8.07.93a10 10 0 0 1 0 14.14l-1.41-1.41a8 8 0 0 0 0-11.31l1.41-1.42zM15.54 8.46a5 5 0 0 1 0 7.07l-1.41-1.41a3 3 0 0 0 0-4.24l1.41-1.42z"/></svg>
        <span id="soundLabel">Sound</span>
    </button>

    <button class="skip-btn" id="skipBtn" onclick="skipToSite()">Skip Intro</button>

    <script>
        const video = document.getElementById('introVideo');
        const overlay = document.getElementById('overlay');
        const enterBtn = document.getElementById('enterBtn');
        const skipBtn = document.getElementById('skipBtn');
        const transition = document.getElementById('pageTransition');
        let hasEnded = false;

        // Play video on load
        video.play().catch(() => {
            // Autoplay blocked — show overlay immediately
            showOverlay();
        });

        // When video ends, show overlay
        video.addEventListener('ended', () => {
            showOverlay();
        });

        function showOverlay() {
            if (hasEnded) return;
            hasEnded = true;
            overlay.classList.add('visible');
            skipBtn.classList.add('hidden');
            setTimeout(() => {
                enterBtn.classList.add('show');
            }, 100);
        }

        // Sound toggle
        function toggleSound() {
            video.muted = !video.muted;
            document.getElementById('soundOff').style.display = video.muted ? 'block' : 'none';
            document.getElementById('soundOn').style.display = video.muted ? 'none' : 'block';
        }

        // Skip intro
        function skipToSite() {
            transition.classList.add('active');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 600);
        }

        // Enter site with transition
        function navigateToSite(e) {
            e.preventDefault();
            transition.classList.add('active');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 600);
        }

        // Fallback: if video doesn't load or takes too long, show overlay after 12s
        setTimeout(() => {
            if (!hasEnded) showOverlay();
        }, 12000);
    </script>
</body>
</html>
