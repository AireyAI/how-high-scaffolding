<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | How High Scaffolding</title>
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0A;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 30%, rgba(232,122,30,0.08), transparent 70%),
                radial-gradient(ellipse 80% 50% at 50% 100%, rgba(232,122,30,0.06), transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }
        .container { max-width: 540px; position: relative; z-index: 2; }
        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #E87A1E;
            margin-bottom: 24px;
            opacity: 0.9;
        }
        .kicker::before, .kicker::after {
            content: '';
            width: 28px;
            height: 1px;
            background: rgba(232,122,30,0.6);
            display: inline-block;
        }
        .code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(6rem, 22vw, 12rem);
            color: #E87A1E;
            line-height: 0.9;
            letter-spacing: 0.05em;
            text-shadow:
                0 0 60px rgba(232,122,30,0.35),
                0 0 120px rgba(232,122,30,0.18);
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin: 20px 0 14px;
        }
        p {
            color: #A0A0A0;
            line-height: 1.7;
            margin-bottom: 36px;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }
        .actions { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #E87A1E;
            color: #0A0A0A;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            padding: 14px 36px;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 30px rgba(232,122,30,0.25);
        }
        .btn:hover { background: #FF9642; transform: translateY(-2px); box-shadow: 0 8px 40px rgba(232,122,30,0.4); }
        .btn--ghost {
            background: transparent;
            color: #FFFFFF;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none;
        }
        .btn--ghost:hover {
            background: transparent;
            border-color: rgba(232,122,30,0.6);
            color: #E87A1E;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="kicker">Off The Grid</span>
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>Looks like this scaffold hasn't been built yet. Let's get you back on solid ground.</p>
        <div class="actions">
            <a href="home.html" class="btn">Back to Home</a>
            <a href="tel:07944362960" class="btn btn--ghost">Call 07944 362 960</a>
        </div>
    </div>
</body>
</html>
