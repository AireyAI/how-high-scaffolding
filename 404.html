<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | How High Scaffolding</title>
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0A;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 500px; }
        .code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(6rem, 20vw, 10rem);
            color: #E87A1E;
            line-height: 1;
            letter-spacing: 0.05em;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 16px 0 12px;
        }
        p {
            color: #A0A0A0;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background: #E87A1E;
            color: #0A0A0A;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            padding: 14px 40px;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.3s ease;
        }
        .btn:hover { background: #FF9642; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>Looks like this scaffold hasn't been built yet. Let's get you back on solid ground.</p>
        <a href="home.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
